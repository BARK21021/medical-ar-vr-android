name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      APP_ANDROID_SDK_PATH: /home/runner/.buildozer/android/platform/android-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''
          accept-android-sdk-licenses: false

      - name: Install dependencies
        run: |
          pip install buildozer "cython<3.0" virtualenv
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk-headless zlib1g-dev libncurses5-dev libncursesw5-dev libbz2-dev libsqlite3-dev libffi-dev autoconf automake libtool pkg-config libltdl-dev unzip libtinfo5 zip

      - name: Prepare Android SDK
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/20.0/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --licenses > /dev/null
          yes | "$SDKMANAGER" --install "platform-tools" "platforms;android-33" "build-tools;34.0.0" "build-tools;37.0.0"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/build-tools/37.0.0" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> "$GITHUB_PATH"
          ls -R "$ANDROID_SDK_ROOT/build-tools" || true

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build_log.txt

      - name: Locate APK
        run: |
          echo "Searching for APK outputs..."
          find . -type f -name "*.apk" | sort || true
          APK_PATH=$(find ./bin -maxdepth 1 -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -type f -name "*.apk" | head -n 1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "APK not found after build"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          echo "Resolved APK path: $APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: medical-ar-vr-apk
          path: |
            ${{ env.APK_PATH }}
            build_log.txt
          if-no-files-found: error
